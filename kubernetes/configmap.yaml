# Kubernetes ConfigMap
# This stores configuration data as key-value pairs
# Our application reads these as environment variables

apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-config
  labels:
    app: demo
data:
  # Spring Boot configuration
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8080"
  LOGGING_LEVEL_ROOT: "INFO"
  
  # Application metadata
  APP_NAME: "demo-app"
  APP_VERSION: "1.0.0"
