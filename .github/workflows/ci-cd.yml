# GitHub Actions CI/CD Pipeline
# This file will automate: build → test → push to Docker Hub → deploy to GKE
# We'll complete this in Step 8

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
    
    # We'll add more steps in Step 8
    - name: Build with Maven
      run: mvn clean package -DskipTests
